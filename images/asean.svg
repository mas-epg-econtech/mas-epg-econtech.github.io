<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="as-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F3F9F3"/>
      <stop offset="1" stop-color="#B9D4C0"/>
    </linearGradient>
    <linearGradient id="as-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF4EF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#as-bg)"/>

  <!-- light grid -->
  <g stroke="#3D6A4B" stroke-width="0.4" opacity="0.14">
    <line x1="0"   y1="90"  x2="800" y2="90"/>
    <line x1="0"   y1="180" x2="800" y2="180"/>
    <line x1="0"   y1="270" x2="800" y2="270"/>
    <line x1="0"   y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0"   x2="160" y2="450"/>
    <line x1="320" y1="0"   x2="320" y2="450"/>
    <line x1="480" y1="0"   x2="480" y2="450"/>
    <line x1="640" y1="0"   x2="640" y2="450"/>
  </g>

  <!-- heading band -->
  <g transform="translate(46,38)">
    <rect x="-6" y="-4" width="280" height="44" fill="#2F6B45"/>
    <text x="14" y="24" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#FFFDF5" font-weight="700" letter-spacing="3">ASEAN MARKETS BOARD</text>
  </g>

  <!-- six country tiles -->
  <!-- Tile style: panel with country name, indicator label, sparkline, value -->

  <!-- Singapore -->
  <g transform="translate(60,120)">
    <rect x="0" y="0" width="220" height="130" fill="url(#as-panel)" stroke="#2F6B45" stroke-width="1.8" rx="6"/>
    <text x="16" y="28" font-family="Georgia, serif" font-size="16" fill="#2F4A2F" font-weight="700">Singapore</text>
    <text x="16" y="46" font-family="Georgia, serif" font-size="10" fill="#5A7560" letter-spacing="1.4">STI · SGD · 10Y</text>
    <polyline points="16,102 44,96 72,100 100,90 128,94 156,82 184,86 204,78"
              fill="none" stroke="#2F6B45" stroke-width="2.2"/>
    <circle cx="204" cy="78" r="3.5" fill="#C24234"/>
    <text x="16" y="120" font-family="Georgia, serif" font-size="13" fill="#2F4A2F" font-weight="700">+0.8%</text>
    <text x="198" y="120" font-family="Georgia, serif" font-size="10" fill="#5A7560" text-anchor="end" letter-spacing="1">14 APR</text>
  </g>

  <!-- Malaysia -->
  <g transform="translate(290,120)">
    <rect x="0" y="0" width="220" height="130" fill="url(#as-panel)" stroke="#2F6B45" stroke-width="1.8" rx="6"/>
    <text x="16" y="28" font-family="Georgia, serif" font-size="16" fill="#2F4A2F" font-weight="700">Malaysia</text>
    <text x="16" y="46" font-family="Georgia, serif" font-size="10" fill="#5A7560" letter-spacing="1.4">KLCI · MYR · 10Y</text>
    <polyline points="16,90 44,96 72,88 100,94 128,82 156,86 184,78 204,74"
              fill="none" stroke="#2F6B45" stroke-width="2.2"/>
    <circle cx="204" cy="74" r="3.5" fill="#C24234"/>
    <text x="16" y="120" font-family="Georgia, serif" font-size="13" fill="#2F4A2F" font-weight="700">3.603%</text>
    <text x="198" y="120" font-family="Georgia, serif" font-size="10" fill="#5A7560" text-anchor="end" letter-spacing="1">14 APR</text>
  </g>

  <!-- Thailand -->
  <g transform="translate(520,120)">
    <rect x="0" y="0" width="220" height="130" fill="url(#as-panel)" stroke="#2F6B45" stroke-width="1.8" rx="6"/>
    <text x="16" y="28" font-family="Georgia, serif" font-size="16" fill="#2F4A2F" font-weight="700">Thailand</text>
    <text x="16" y="46" font-family="Georgia, serif" font-size="10" fill="#5A7560" letter-spacing="1.4">SET · THB · 10Y</text>
    <polyline points="16,100 44,94 72,98 100,86 128,90 156,76 184,80 204,68"
              fill="none" stroke="#2F6B45" stroke-width="2.2"/>
    <circle cx="204" cy="68" r="3.5" fill="#C24234"/>
    <text x="16" y="120" font-family="Georgia, serif" font-size="13" fill="#2F4A2F" font-weight="700">2.048%</text>
    <text x="198" y="120" font-family="Georgia, serif" font-size="10" fill="#5A7560" text-anchor="end" letter-spacing="1">14 APR</text>
  </g>

  <!-- Indonesia -->
  <g transform="translate(60,275)">
    <rect x="0" y="0" width="220" height="130" fill="url(#as-panel)" stroke="#2F6B45" stroke-width="1.8" rx="6"/>
    <text x="16" y="28" font-family="Georgia, serif" font-size="16" fill="#2F4A2F" font-weight="700">Indonesia</text>
    <text x="16" y="46" font-family="Georgia, serif" font-size="10" fill="#5A7560" letter-spacing="1.4">JCI · IDR · 10Y</text>
    <polyline points="16,80 44,88 72,82 100,92 128,86 156,96 184,92 204,98"
              fill="none" stroke="#C24234" stroke-width="2.2"/>
    <circle cx="204" cy="98" r="3.5" fill="#C24234"/>
    <text x="16" y="120" font-family="Georgia, serif" font-size="13" fill="#2F4A2F" font-weight="700">17,109</text>
    <text x="198" y="120" font-family="Georgia, serif" font-size="10" fill="#5A7560" text-anchor="end" letter-spacing="1">14 APR</text>
  </g>

  <!-- Philippines -->
  <g transform="translate(290,275)">
    <rect x="0" y="0" width="220" height="130" fill="url(#as-panel)" stroke="#2F6B45" stroke-width="1.8" rx="6"/>
    <text x="16" y="28" font-family="Georgia, serif" font-size="16" fill="#2F4A2F" font-weight="700">Philippines</text>
    <text x="16" y="46" font-family="Georgia, serif" font-size="10" fill="#5A7560" letter-spacing="1.4">PSE · PHP · 10Y</text>
    <polyline points="16,94 44,90 72,96 100,84 128,88 156,82 184,78 204,82"
              fill="none" stroke="#2F6B45" stroke-width="2.2"/>
    <circle cx="204" cy="82" r="3.5" fill="#C24234"/>
    <text x="16" y="120" font-family="Georgia, serif" font-size="13" fill="#2F4A2F" font-weight="700">60.13</text>
    <text x="198" y="120" font-family="Georgia, serif" font-size="10" fill="#5A7560" text-anchor="end" letter-spacing="1">14 APR</text>
  </g>

  <!-- Vietnam -->
  <g transform="translate(520,275)">
    <rect x="0" y="0" width="220" height="130" fill="url(#as-panel)" stroke="#2F6B45" stroke-width="1.8" rx="6"/>
    <text x="16" y="28" font-family="Georgia, serif" font-size="16" fill="#2F4A2F" font-weight="700">Vietnam</text>
    <text x="16" y="46" font-family="Georgia, serif" font-size="10" fill="#5A7560" letter-spacing="1.4">VNI · VND · COMM</text>
    <polyline points="16,92 44,86 72,82 100,78 128,74 156,76 184,70 204,66"
              fill="none" stroke="#2F6B45" stroke-width="2.2"/>
    <circle cx="204" cy="66" r="3.5" fill="#C24234"/>
    <text x="16" y="120" font-family="Georgia, serif" font-size="13" fill="#2F4A2F" font-weight="700">26,247</text>
    <text x="198" y="120" font-family="Georgia, serif" font-size="10" fill="#5A7560" text-anchor="end" letter-spacing="1">14 APR</text>
  </g>

  <!-- small decorative footer stamp -->
  <g transform="translate(620,40)">
    <circle r="18" fill="none" stroke="#2F6B45" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Georgia, serif" font-size="10" fill="#2F6B45" text-anchor="middle" font-weight="700" letter-spacing="1">LIVE</text>
  </g>
</svg>
